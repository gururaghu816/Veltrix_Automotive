{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Land Rover Defender | Veltrix</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>

<header>
    <h2>VELTRIX</h2>
    <nav>
        <a href="/">Home</a>
        <a href="/models/">Models</a>
        <a href="/compare/">Compare</a>
        <a href="/about/">About</a>
        <a href="/contact/">Contact</a>
    </nav>
</header>

<section class="car-detail">

    <h1>Land Rover Defender</h1>

    <img id="carImage" src="{% static 'images/land-Rover-Defender.jpg' %}">

    <div class="colors">
        <button onclick="changeEColor('blue')">Blue</button>
        <button onclick="changeEColor('silver')">Silver</button>
        <button onclick="changeEColor('black')">Black</button>
    </div>

    <h2>Specifications</h2>

    <ul>
        <li>Motor: Dual Electric Motor</li>
        <li>Top Speed: 200 km/h</li>
        <li>Power: 500 HP</li>
        <li>Range: 550 km</li>
    </ul>

    <button onclick="openModal()" class="btn">Book Test Drive</button>

</section>

<div id="modal" class="modal">

    <div class="modal-content">

        <span class="close" onclick="closeModal()">&times;</span>

        <h2>Book Test Drive</h2>

        <form>
            <input type="text" placeholder="Name">
            <input type="email" placeholder="Email">
            <input type="tel" placeholder="Phone">
            <button class="btn">Submit</button>
        </form>

    </div>

</div>

<script src="{% static 'js/script.js' %}"></script>

</body>
</html>
