{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>X9 Dominator | Veltrix</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>

<header>
    <h2>VELTRIX</h2>
    <nav>
        <a href="/">Home</a>
        <a href="/models/">Models</a>
        <a href="/compare/">Compare</a>
        <a href="/about/">About</a>
        <a href="/contact/">Contact</a>
    </nav>
</header>

<section class="car-detail">

    <h1>X9 Dominator</h1>

    <img id="carImage" src="{% static 'images/Porsche.jpg' %}">

    <div class="colors">
        <button onclick="changeX9Color('black')">Black</button>
        <button onclick="changeX9Color('white')">White</button>
        <button onclick="changeX9Color('blue')">Blue</button>
    </div>

    <h2>Specifications</h2>

    <ul>
        <li>Engine: 3.5L Twin Turbo V6</li>
        <li>Top Speed: 250 km/h</li>
        <li>0-100 km/h: 5.2 sec</li>
        <li>Horsepower: 480 HP</li>
        <li>Drive Type: AWD</li>
    </ul>

    <button onclick="openModal()" class="btn">Book Test Drive</button>

</section>

<!-- Modal -->
<div id="modal" class="modal">
    <div class="modal-content">

        <span class="close" onclick="closeModal()">&times;</span>

        <h2>Book Test Drive</h2>

        <form>
            <input type="text" placeholder="Name">
            <input type="email" placeholder="Email">
            <input type="tel" placeholder="Phone">
            <button class="btn">Submit</button>
        </form>

    </div>
</div>

<script src="{% static 'js/script.js' %}"></script>

</body>
</html>
