<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veltrix AI Recommendation</title>
    <style>
        :root {
            --bg: #06070b;
            --panel: rgba(255, 255, 255, 0.08);
            --text: #f6f1e8;
            --muted: #b7b0a5;
            --gold: #d4a84a;
            --gold-strong: #f3c96b;
            --border: rgba(212, 168, 74, 0.35);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text);
            background: radial-gradient(circle at top left, rgba(212, 168, 74, 0.22), transparent 28%), linear-gradient(135deg, #050608 0%, #11141b 50%, #08090d 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: linear-gradient(120deg, rgba(255,255,255,0.03), transparent 40%, rgba(255,255,255,0.05));
            pointer-events: none;
        }

        .navbar {
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background: rgba(5, 6, 8, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(212, 168, 74, 0.25);
        }

        .logo {
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: 0.3rem;
            color: var(--gold-strong);
            text-transform: uppercase;
        }

        .nav-links { display: flex; gap: 1rem; }

        .nav-links a {
            color: var(--muted);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .nav-links a:hover { color: var(--gold-strong); }

        .hero {
            max-width: 1100px;
            margin: 0 auto;
            padding: 3rem 1.25rem 2rem;
            text-align: center;
        }

        .hero h1 {
            font-size: clamp(2rem, 4vw, 2.8rem);
            margin-bottom: 0.75rem;
            color: var(--gold-strong);
            animation: fadeUp 0.8s ease both;
        }

        .hero p {
            max-width: 700px;
            margin: 0 auto 2rem;
            color: var(--muted);
            line-height: 1.7;
            animation: fadeUp 1s ease both;
        }

        .card {
            max-width: 720px;
            margin: 0 auto 3rem;
            padding: 2rem;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--border);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(22px);
            -webkit-backdrop-filter: blur(22px);
            animation: floatIn 0.9s ease both;
        }

        .card h2 {
            margin-top: 0;
            margin-bottom: 1.5rem;
            font-size: 1.3rem;
            color: var(--gold-strong);
        }

        .form-grid { display: grid; gap: 1rem; }

        .field { display: flex; flex-direction: column; gap: 0.45rem; }

        .field label { font-weight: 600; color: var(--text); }

        .field input,
        .field select {
            width: 100%;
            padding: 0.9rem 1rem;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.06);
            color: var(--text);
            outline: none;
            transition: border-color 0.3s ease, transform 0.3s ease, box-shadow 0.3s ease;
        }

        .field input:focus,
        .field select:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(212, 168, 74, 0.18);
            transform: translateY(-1px);
        }

        .btn {
            margin-top: 0.5rem;
            padding: 0.95rem 1.3rem;
            border: none;
            border-radius: 999px;
            font-size: 1rem;
            font-weight: 700;
            color: #1b1408;
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-strong) 100%);
            cursor: pointer;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            box-shadow: 0 12px 28px rgba(212, 168, 74, 0.25);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 35px rgba(212, 168, 74, 0.32);
        }

        footer {
            padding: 1.2rem 1rem 2rem;
            text-align: center;
            color: var(--muted);
            border-top: 1px solid rgba(255,255,255,0.08);
        }

        .socials {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 0.6rem;
        }

        .socials a {
            color: var(--text);
            text-decoration: none;
            transition: color 0.3s ease, transform 0.3s ease;
        }

        .socials a:hover {
            color: var(--gold-strong);
            transform: translateY(-2px);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(18px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes floatIn {
            from { opacity: 0; transform: translateY(24px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @media (max-width: 720px) {
            .navbar { padding: 1rem 1rem; flex-direction: column; gap: 0.7rem; }
            .hero { padding-top: 2rem; }
            .card { padding: 1.3rem; margin-bottom: 2rem; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">Veltrix</div>
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">Models</a>
            <a href="#">Contact</a>
        </div>
    </nav>

    <section class="hero">
        <h1>Find Your Perfect Drive</h1>
        <p>Discover the perfect luxury, family, or performance vehicle with a refined experience  your style and budget.</p>

        <div class="card">
            <h2>Tell us what you need</h2>
            <form method="POST">
                {% csrf_token %}

                <div class="form-grid">
                    <div class="field">
                        <label for="budget">Budget (Lakhs)</label>
                        <input type="number" id="budget" name="budget" required placeholder="Enter your budget">
                    </div>

                    <div class="field">
                        <label for="purpose">Purpose</label>
                        <select id="purpose" name="purpose">
                            <option>Family</option>
                            <option>Luxury</option>
                            <option>Sports</option>
                            <option>Daily Commute</option>
                        </select>
                    </div>

                    <div class="field">
                        <label for="fuel_type">Fuel Type</label>
                        <select id="fuel_type" name="fuel_type">
                            <option>Petrol</option>
                            <option>Diesel</option>
                            <option>Electric</option>
                        </select>
                    </div>
                </div>

                <button class="btn" type="submit">Recommend Cars</button>
            </form>
        </div>
    </section>

    <footer>
        <div>Follow Veltrix</div>
        <div class="socials">
            <a href="#">Instagram</a>
            <a href="#">Facebook</a>
            <a href="#">LinkedIn</a>
        </div>
    </footer>
</body>
</html>
