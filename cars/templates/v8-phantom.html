{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>V8 Phantom | Veltrix</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>

<header>
    <h2>VELTRIX</h2>
    <nav>
        <a href="/">Home</a>
        <a href="/models/">Models</a>
        <a href="/compare/">Compare</a>
        <a href="/about/">About</a>
        <a href="/contact/">Contact</a>
    </nav>
</header>

<section class="car-detail">

    <h1>V8 Phantom</h1>

    <img id="carImage" src="{% static 'images/v8-phantom.jpg' %}">

    <div class="colors">
        <button onclick="changeColor('red')">Red</button>
        <button onclick="changeColor('black')">Black</button>
        <button onclick="changeColor('silver')">Silver</button>
    </div>

    <h2>Specifications</h2>

    <ul>
        <li>Engine: 4.0L Twin Turbo V8</li>
        <li>Top Speed: 320 km/h</li>
        <li>0-100 km/h: 3.5 sec</li>
        <li>Horsepower: 650 HP</li>
    </ul>

    <button onclick="openModal()" class="btn">Book Test Drive</button>

</section>

<!-- Modal -->
<div id="modal" class="modal">
    <div class="modal-content">
        <span onclick="closeModal()" class="close">&times;</span>

        <h2>Book Test Drive</h2>
        <form>
            <input type="text" placeholder="Name">
            <input type="email" placeholder="Email">
            <input type="tel" placeholder="Phone">
            <button class="btn">Submit</button>
        </form>
    </div>
</div>

<script src="{% static 'js/script.js' %}"></script>

</body>
</html>
